<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Shisha Point — Temporary outage</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a222d;
      --accent: #c9a227;
      --text: #f0ebe3;
      --muted: #9aa3ad;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #1e2836 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.55;
    }
    main {
      max-width: 28rem;
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(201, 162, 39, 0.25);
      border-radius: 1rem;
      padding: 2rem 1.75rem;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
    }
    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p { color: var(--muted); margin-bottom: 1rem; font-size: 0.95rem; }
    .highlight {
      background: rgba(201, 162, 39, 0.12);
      border: 1px solid rgba(201, 162, 39, 0.35);
      border-radius: 0.75rem;
      padding: 1.1rem 1rem;
      margin: 1.25rem 0;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">Shisha Point</div>
    <h1>Temporary service outage</h1>
    <p>
      We apologise for the inconvenience. Our website is temporarily unavailable
      due to a server issue.
    </p>
    <div class="highlight">
      You can still order as usual <strong>at the bar</strong> — our team is here to help.
    </div>
    <p>Thank you for your patience. We will be back online shortly.</p>
  </main>
</body>
</html>
