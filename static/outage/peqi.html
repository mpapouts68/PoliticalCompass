<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Peqi Hair — Temporary outage</title>
  <style>
    :root {
      --bg: #faf8f6;
      --card: #ffffff;
      --accent: #8b6f5c;
      --accent-dark: #6d5646;
      --text: #2c2420;
      --muted: #6b635c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(165deg, #f5efe9 0%, var(--bg) 40%, #efe8e2 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.55;
    }
    main {
      max-width: 28rem;
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(139, 111, 92, 0.2);
      border-radius: 1rem;
      padding: 2rem 1.75rem;
      text-align: center;
      box-shadow: 0 16px 40px rgba(44, 36, 32, 0.08);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-dark);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p { color: var(--muted); margin-bottom: 1rem; font-size: 0.95rem; }
    .phone-wrap { margin: 1.35rem 0; }
    .phone {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.9rem 1.5rem;
      border-radius: 999px;
      transition: background 0.2s;
    }
    .phone:hover { background: var(--accent-dark); }
    .phone-label {
      display: block;
      margin-top: 0.65rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">Peqi Hair</div>
    <h1>Temporary service outage</h1>
    <p>
      We apologise for the inconvenience. Our website is temporarily unavailable
      due to a server issue.
    </p>
    <p>To book an appointment, please call us directly:</p>
    <div class="phone-wrap">
      <a class="phone" href="tel:+302897023232">2897 023232</a>
      <span class="phone-label">Tap to call from your phone</span>
    </div>
    <p>Thank you for your patience. We will be back online shortly.</p>
  </main>
</body>
</html>
